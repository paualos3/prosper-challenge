services:
  db:
    image: postgres:16
    container_name: prosper-db
    environment:
      POSTGRES_DB: prosper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prosper"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prosper-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SCHEDULER_BACKEND: postgres
      DATABASE_URL: postgresql://postgres:postgres@db:5432/prosper
    working_dir: /app
    command: uv run bot.py
    volumes:
      - ./:/app
    ports:
      - "7860:7860"

volumes:
  postgres_data:
